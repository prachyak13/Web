<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>MY HLS PLAYER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Clappr Player -->
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>

    <!-- Level Selector (เลือกความชัด) -->
    <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100%;
            overflow: hidden;
        }
        #player {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>

<div id="player"></div>

<script>
    var player = new Clappr.Player({
        source: 'http://195.128.27.141:80/live/29635847216070086058/5jq68fox8okip6k08rbs/1776069.m3u8',
        mimeType: 'application/x-mpegURL',

        parentId: '#player',
        width: '100%',
        height: '100%',
        autoPlay: true,

        plugins: [LevelSelector],

        playback: {
            playInline: true,
            hlsjsConfig: {
                maxBufferLength: 30,
                liveSyncDurationCount: 3
            }
        }
    });

    // 🔁 Auto reload ถ้าสตรีมดับ
    player.on(Clappr.Events.PLAYER_ERROR, function() {
        console.log('Stream error, reloading...');
        setTimeout(function() {
            player.load(player.options.source);
            player.play();
        }, 3000);
    });

</script>

</body>
</html>

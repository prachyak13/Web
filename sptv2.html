<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Advanced HLS Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
}
video {
    width: 100%;
    height: 100vh;
    background: black;
}
</style>
</head>

<body>

<video id="video" controls autoplay muted playsinline></video>

<script>
const video = document.getElementById('video');

const streamURL = 'http://195.128.27.141:80/live/29635847216070086058/5jq68fox8okip6k08rbs/1776069.m3u8';

if (Hls.isSupported()) {

    const hls = new Hls({
        debug: false,

        maxBufferLength: 10,
        maxMaxBufferLength: 20,
        liveSyncDurationCount: 1,

        manifestLoadingTimeOut: 20000,
        fragLoadingTimeOut: 20000,
        levelLoadingTimeOut: 20000,

        enableWorker: true,
        lowLatencyMode: true
    });

    hls.loadSource(streamURL);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play();
    });

    // 🔥 ระบบแก้ error อัตโนมัติ
    hls.on(Hls.Events.ERROR, function (event, data) {
        console.log('ERROR:', data);

        if (data.fatal) {
            switch(data.type) {

                case Hls.ErrorTypes.NETWORK_ERROR:
                    console.log('🔁 Network error → reload');
                    hls.startLoad();
                    break;

                case Hls.ErrorTypes.MEDIA_ERROR:
                    console.log('🔁 Media error → recover');
                    hls.recoverMediaError();
                    break;

                default:
                    console.log('💀 Destroy + reload');
                    hls.destroy();
                    setTimeout(() => startPlayer(), 3000);
                    break;
            }
        }
    });

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = streamURL;
    video.addEventListener('loadedmetadata', function () {
        video.play();
    });
}

// 🔁 Auto reload ถ้าภาพค้าง
setInterval(() => {
    if (video.readyState === 2) {
        console.log('⚠️ Stuck → reload');
        video.load();
        video.play();
    }
}, 10000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CINEMAX - MY PLAYER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/clappr/dash-shaka-playback@latest/dist/dash-shaka-playback.external.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/level-selector@latest/dist/level-selector.min.js"></script>

    <style> 
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #player { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var player = new Clappr.Player({
            source: 'https://cco-streamer1.cdn.3bbtv.com:8443/3bb/live/107/107.mpd',
            mimeType: 'application/dash+xml',
            width: '100%',
            height: '100%',
            autoPlay: true,
            plugins: [LevelSelector, DashShakaPlayback],
            shakaConfiguration: {
                drm: {
                    clearKeys: {
                        'f48caba466394e93b50780f21798787a': '9a074a10db4342e7937076b3e52f6029'
                    }
                }
            },
            parentId: '#player'
        });
    </script>
</body>
</html>

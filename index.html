<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>MY PRIVATE PLAYER</title> <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@0.4.0/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@2.5.10/dist/shaka-player.compiled.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/clappr/dash-shaka-playback@latest/dist/dash-shaka-playback.external.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/level-selector@latest/dist/level-selector.min.js"></script>

    <style> 
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #player { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="player"></div>

    <script>
        var player = new Clappr.Player({
            source: 'https://cco-streamer1.cdn.3bbtv.com:8443/3bb/live/101/101.mpd',
            mimeType: 'application/dash+xml',
            width: '100%',
            height: '100%',
            autoPlay: true,
            plugins: [LevelSelector, DashShakaPlayback],
            shakaConfiguration: {
                drm: {
                    clearKeys: {
                        'dac6cbd9d17a451bb76386f52469e0e9': '2e2ac52cadf843459915eaa1a9b95e48'
                    }
                }
            },
            parentId: '#player'
        });
    </script>
</body>
</html>

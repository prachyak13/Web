<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>PRO PLAYER - SERVER 195</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .video-js { width: 100% !important; height: 100vh !important; }
        #status { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.5); padding: 5px 10px; z-index: 99; font-family: sans-serif; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="status">กำลังเชื่อมต่อกับ GitHub...</div>
    <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{}'></video>

    <script>
        // 1. ลิงก์ไฟล์ Raw จาก GitHub ของคุณ
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/prachyak13/server195/main/truespotv2';

        async function initPlayer() {
            const statusEl = document.getElementById('status');
            try {
                // 2. ดึงข้อมูลจาก GitHub
                const response = await fetch(GITHUB_RAW_URL);
                const text = await response.text();
                
                // 3. กรองหาบรรทัดที่เป็น URL (http://...)
                const lines = text.split('\n');
                const streamUrl = lines.find(line => line.trim().startsWith('http')).trim();

                if (streamUrl) {
                    statusEl.innerText = "กำลังเล่น: " + streamUrl.split('/').pop();
                    
                    var player = videojs('my-video');
                    player.src({
                        src: streamUrl,
                        type: 'application/x-mpegURL' // สำหรับไฟล์ .m3u8
                    });
                    player.play();
                } else {
                    statusEl.innerText = "❌ ไม่พบ URL ในไฟล์";
                }
            } catch (error) {
                console.error(error);
                statusEl.innerText = "❌ เกิดข้อผิดพลาดในการดึงข้อมูล";
            }
        }

        // เริ่มทำงาน
        initPlayer();
    </script>
</body>
</html>

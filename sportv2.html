<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Sport V2 - Fix Pass</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #status { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.6); padding: 5px 10px; font-size: 12px; z-index: 10; border: 1px solid #0f0; }
    </style>
</head>
<body>

    <div id="status">กำลังดึงลิงก์จาก GitHub Raw...</div>
    <video id="video" controls autoplay playsinline></video>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        
        // ลิงก์ Raw ของคุณ
        const GITHUB_RAW = 'https://raw.githubusercontent.com/prachyak13/server195/main/truespotv2';

        async function loadAndPlay() {
            try {
                const response = await fetch(GITHUB_RAW);
                const text = await response.text();
                const streamUrl = text.split('\n').find(l => l.trim().startsWith('http')).trim();

                if (Hls.isSupported()) {
                    var hls = new Hls();
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        status.innerText = "● LIVE: กำลังเล่น";
                        video.play();
                    });
                    
                    // ดักจับ Error เพื่อบอกผู้ใช้
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            status.innerText = "❌ กรุณากดรูปแม่กุญแจแล้วเลือก Allow Insecure Content";
                            status.style.color = "red";
                            status.style.borderColor = "red";
                        }
                    });
                }
            } catch (err) {
                status.innerText = "❌ ดึงข้อมูล Raw ไม่สำเร็จ";
            }
        }

        loadAndPlay();
    </script>
</body>
</html>

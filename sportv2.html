<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>True Sport 2 - Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #player { width: 100%; height: 100vh; }
    </style>
</head>
<body>

<div id="player">
    <video id="video" controls autoplay playsinline style="width:100%; height:100%;"></video>
</div>

<script>
    var video = document.getElementById('video');
    
    // *** จุดที่ต้องเปลี่ยน: ใส่ลิงก์สด Sport ของคุณที่นี่ ***
    var streamUrl = 'http://195.128.27.141:80/live/29635847216070086058/5jq68fox8okip6k08rbs/1776069.m3u8';

    if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
    }
</script>

</body>
</html>

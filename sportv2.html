<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>M3U PLAYER PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100vh; object-fit: contain; }
        #status { position: absolute; top: 10px; left: 10px; color: #00ff00; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 5px; font-family: monospace; z-index: 100; font-size: 14px; }
    </style>
</head>
<body>

    <div id="status">กำลังโหลด M3U...</div>
    <video id="video" controls autoplay playsinline></video>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        // ลิงก์ GitHub Raw ของคุณ
        const GITHUB_SOURCE = 'https://raw.githubusercontent.com/prachyak13/server195/main/truespotv2';

        async function initPlayer() {
            try {
                // 1. ดึงข้อมูลจากไฟล์ใน GitHub
                const response = await fetch(GITHUB_SOURCE);
                const text = await response.text();
                
                // 2. ค้นหาบรรทัดที่เป็นลิงก์ http (กรองจากไฟล์ M3U)
                const streamUrl = text.split('\n').find(line => line.trim().startsWith('http')).trim();

                if (!streamUrl) {
                    status.innerText = "❌ ไม่พบลิงก์ในไฟล์ M3U";
                    return;
                }

                status.innerText = "กำลังเชื่อมต่อ Stream...";

                // 3. เริ่มการทำงานของ Hls.js
                if (Hls.isSupported()) {
                    const hls = new Hls({
                        debug: false,
                        enableWorker: true,
                        lowLatencyMode: true
                    });
                    
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        status.innerText = "กำลังรับชม";
                        video.play().catch(() => {
                            status.innerText = "⚠️ โปรดกด Play เพื่อเริ่มดู";
                        });
                        // ซ่อนแถบสถานะหลังจากเล่นไป 3 วินาที
                        setTimeout(() => status.style.display = 'none', 3000);
                    });

                    hls.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal) {
                            status.innerText = "❌ เกิดข้อผิดพลาด: " + data.type;
                            hls.recoverMediaError();
                        }
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // สำหรับ Safari บน iOS/Mac ที่เล่น m3u8 ได้เอง
                    video.src = streamUrl;
                    video.addEventListener('loadedmetadata', function() {
                        video.play();
                        status.style.display = 'none';
                    });
                }

            } catch (err) {
                status.innerText = "❌ ติดปัญหา CORS หรือ GitHub ล่ม";
                console.error(err);
            }
        }

        initPlayer();
    </script>
</body>
</html>

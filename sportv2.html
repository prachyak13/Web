<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Sport V2 - GitHub Raw Player</title>
    <script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
    <script>jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';</script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="player"></div>

    <script>
        // ลิงก์ Raw ที่คุณให้มา
        const GITHUB_RAW = 'https://raw.githubusercontent.com/prachyak13/server195/refs/heads/main/truespotv2';

        async function initApp() {
            try {
                // 1. ดึงข้อมูลจาก GitHub Raw
                const response = await fetch(GITHUB_RAW);
                const data = await response.text();
                
                // 2. ค้นหาบรรทัดที่มี http (กรองเอาเฉพาะ URL วิดีโอ)
                const lines = data.split('\n');
                const streamUrl = lines.find(line => line.trim().startsWith('http')).trim();

                if (!streamUrl) throw new Error("ไม่พบลิงก์วิดีโอ");

                // 3. ตั้งค่า JW Player โดยใช้ลิงก์ที่ดึงมาได้
                var playerInstance = jwplayer("player");
                playerInstance.setup({
                    playlist: [{
                        "sources": [{
                            "default": true,
                            "type": "hls",
                            "file": streamUrl,
                            "label": "HD"
                        }]
                    }],
                    width: "100%",
                    height: "100%",
                    aspectratio: "16:9",
                    autostart: true,
                    mute: false,
                    cast: {},
                });

            } catch (err) {
                console.error("Error loading stream:", err);
                document.body.innerHTML = "<div style='color:white; padding:20px;'>เกิดข้อผิดพลาด: ไม่สามารถดึงข้อมูลจาก GitHub ได้</div>";
            }
        }

        initApp();
    </script>
</body>
</html>
